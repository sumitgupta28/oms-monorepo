server:
  port: 8080

spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://keycloak:8080}/realms/${KEYCLOAK_REALM:oms}

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: agent-service
          uri: ${AGENT_SERVICE_URI:http://agent-service:8085}
          predicates:
            - Path=/api/chat/**
          filters:
            - TokenRelay=
            - StripPrefix=1

        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://order-service:8081}
          predicates:
            - Path=/api/orders/**
          filters:
            - TokenRelay=
            - StripPrefix=1

        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://product-service:8084}
          predicates:
            - Path=/api/products/**
          filters:
            - TokenRelay=
            - StripPrefix=1

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://payment-service:8082}
          predicates:
            - Path=/api/payments/**
          filters:
            - TokenRelay=
            - StripPrefix=1

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI:http://inventory-service:8083}
          predicates:
            - Path=/api/inventory/**
          filters:
            - TokenRelay=
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics
