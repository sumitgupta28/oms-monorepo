server:
  port: 8080

spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:oms}

  cloud:
    gateway:
      routes:
        - id: agent-service
          uri: ${AGENT_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/chat/**
          filters:
            - StripPrefix=1

        - id: order-service
          uri: ${ORDER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=1

        - id: product-service
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/products/**
          filters:
            - StripPrefix=1

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/inventory/**
          filters:
            - StripPrefix=1

keycloak:
  url: ${KEYCLOAK_URL:http://localhost:8180}
  realm: ${KEYCLOAK_REALM:oms}
  client-id: gateway
  client-secret: ${KEYCLOAK_CLIENT_SECRET:gateway-secret-local}
  public-client-id: ${KEYCLOAK_PUBLIC_CLIENT_ID:react-ui}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: DEBUG
