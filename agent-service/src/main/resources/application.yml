server:
  port: 8085
spring:
  application:
    name: agent-service
  profiles:
    active: ${AI_PROVIDER:ollama}
  autoconfigure:
    exclude:
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agent}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: agent-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/oms}
services:
  order-url:     ${ORDER_SERVICE_URL:http://order-service:8081}
  payment-url:   ${PAYMENT_SERVICE_URL:http://payment-service:8082}
  inventory-url: ${INVENTORY_SERVICE_URL:http://product-service:8084}
  product-url:   ${PRODUCT_SERVICE_URL:http://product-service:8084}
embedding:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: ${EMBEDDING_MODEL:nomic-embed-text}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

logging:
  level:
    com.oms.agent.aspect: debug
    org.springframework.web: TRACE
    org.springframework.ai: TRACE
    org.springframework.web.client: TRACE



