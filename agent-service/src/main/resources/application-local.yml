server:
  port: 8085
spring:
  application:
    name: agent-service
  autoconfigure:
    exclude:
      - org.springframework.ai.model.anthropic.autoconfigure.AnthropicChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaApiAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/oms}
services:
  order-url:     ${ORDER_SERVICE_URL:http://localhost:8081}
  payment-url:   ${PAYMENT_SERVICE_URL:http://localhost:8082}
  inventory-url: ${INVENTORY_SERVICE_URL:http://localhost:8083}
  product-url:   ${PRODUCT_SERVICE_URL:http://localhost:8084}
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

logging:
  level:
    com.oms.agent.aspect: debug